<!doctype html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NyaTerm</title>
  <style>
    html,
    body,
    #root {
      margin: 0;
      height: 100%;
      background-color: var(--df-bootstrap-bg, #0d1117);
    }
  </style>
  <script>
    try {
      var bootstrapBg = localStorage.getItem("df-theme-background");
      if (bootstrapBg) {
        document.documentElement.style.setProperty("--df-bootstrap-bg", bootstrapBg);
      }
    } catch {}
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
